<div class="passage-display">
    <h2>{{ reference }}</h2>
    {% for t in translations %}
    <div class="translation-block">
        <h3>{{ t.version }}</h3>
        <div class="passage-text">{{ t.text }}</div>
    </div>
    {% else %}
    <p class="empty-state">Could not load passage text.</p>
    {% endfor %}
</div>
