{% if candidates %}
<div class="sermon-card sermon-card-candidates">
  <h2>Candidate prep sessions</h2>
  <p>Not sure which session you prepped for this sermon. Pick one:</p>
  <ul>
    {% for c in candidates %}
      <li>
        <form method="post" action="/sermons/{{ c.sermon_id }}/approve-candidate/{{ c.id }}" style="display:inline">
          <span>{{ c.passage_ref or c.bible_text_raw or c.title or '(unknown)' }}</span>
          <span class="match-reason">{{ c.match_reason }}</span>
          <button type="submit">Approve</button>
        </form>
      </li>
    {% endfor %}
  </ul>
</div>
{% endif %}
